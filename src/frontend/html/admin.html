<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #222; color: #fff; }
        .container { background: #333; padding: 20px; border-radius: 8px; }
        button { padding: 10px 20px; background: #d64d00; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Admin Dashboard - System Metrics</h1>
        <p>This is the secure administration view.</p>
        <button onclick="fetchMetrics()">Load Real-Time Metrics</button>
        <div id="response" style="margin-top: 20px; font-family: monospace; color: #ffeb3b;"></div>
    </div>

    <script>
        function fetchMetrics() {
            document.getElementById('response').innerText = "Loading metrics...";
            fetch('/api/analytics/metrics')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('response').innerText = JSON.stringify(data, null, 2);
                })
                .catch(err => {
                    document.getElementById('response').innerText = "Error: Cannot connect to Analytics Service.";
                });
        }
    </script>
</body>
</html>
